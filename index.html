<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge-1 Simple Landing Page with Html and CSS</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Header section -->
    <header>
      <nav>
        <h2>Nusantara Data Visualization</h2>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Datasets</a></li>
          <li><a href="#">Insights</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <!-- Main content -->
    <main>
      <!-- Hero section -->
      <section class="hero">
        <div class="hero-text">
          <h1>Exploring Indonesia Through Interactive Statistics</h1>
          <p>
            Discover official data on tourism, digital transformation, and
            government finance.
          </p>
          <a href="#">Explore Data</a>
        </div>
        <div class="hero-image">
          <img
            src="./assets/hero-dashboard.jpg"
            alt="Data dashboard illustration"
            width="100%"
            height="250"
          />
        </div>
      </section>
    </main>
    <!--Footer section -->
    <footer>
      <p>&copy; 2026 Nusantara Data Visualization.</p>
    </footer>
  </body>
</html>
